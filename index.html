<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apotek Mitra Farma | Obat & Kesehatan Kabupaten Semarang</title>
<meta name="description" content="Apotek Mitra Farma - Solusi pembelian obat tanpa keluar rumah. Konsultasi gratis, pengiriman cepat, Kabupaten Semarang.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --emerald:#00A878; --emerald-dark:#007A57; --emerald-deeper:#005240; --emerald-light:#E0F5EF;
  --emerald-glow:#00A87820; --mint:#B8F0DC; --gold:#D4A017; --gold-light:#FFF3CC;
  --coral:#FF6B6B; --sky:#4ECDC4; --text:#111827; --text-muted:#6B7280; --text-hint:#9CA3AF;
  --bg:#F0FDF8; --bg2:#E8FAF4; --card:#FFFFFF; --border:#D1FAE5; --border-mid:#A7F3D0;
  --radius:14px; --radius-lg:20px; --radius-sm:8px;
  --shadow:0 1px 4px rgba(0,168,120,0.08); --shadow-md:0 4px 20px rgba(0,168,120,0.12);
  --shadow-xl:0 12px 40px rgba(0,168,120,0.18);
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;overflow-x:hidden}

/* NAVBAR */
.navbar{
  background:rgba(255,255,255,0.92); backdrop-filter:blur(16px); border-bottom:1px solid var(--border);
  padding:0 1.5rem; display:flex; align-items:center; justify-content:space-between;
  height:64px; position:sticky; top:0; z-index:200; transition:0.3s
}
.navbar.scrolled{box-shadow:var(--shadow-md)}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-icon{
  width:42px;height:42px; background:linear-gradient(135deg,var(--emerald-deeper),var(--emerald));
  border-radius:12px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(0,168,120,0.3)
}
.logo-icon svg{width:22px;height:22px;fill:white}
.logo-name{font-family:'Sora',sans-serif;font-size:15px;font-weight:700;color:var(--emerald-deeper);line-height:1.1}

.cart-btn{
  background:linear-gradient(135deg,var(--emerald),var(--emerald-dark));
  color:white; border:none; border-radius:10px; padding:9px 16px; cursor:pointer;
  display:flex; align-items:center; gap:7px; font-size:13px; font-weight:600; position:relative
}
.cart-badge{
  background:var(--coral); color:white; border-radius:50%; width:20px; height:20px;
  display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700;
  position:absolute; top:-6px; right:-6px; border:2px solid white; transform:scale(0); transition:0.3s
}
.cart-badge.visible{transform:scale(1)}

/* SEARCH */
.search-section{
  background:var(--card); border-top:1px solid var(--border); border-bottom:1px solid var(--border);
  padding:1rem 1.5rem; position:sticky; top:64px; z-index:100
}
.search-wrap{position:relative}
.search-box{
  width:100%; padding:11px 16px 11px 44px; border:1.5px solid var(--border-mid);
  border-radius:12px; font-size:14px; background:var(--bg); color:var(--text); transition:all 0.25s
}
.search-box:focus{outline:none; border-color:var(--emerald); background:white}
.search-icon{position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-hint)}

/* PRODUCT GRID */
.product-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; padding:1.5rem}
.product-card{
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  overflow:hidden; box-shadow:var(--shadow); display:flex; flex-direction:column; transition:0.25s
}
.product-card:hover{transform:translateY(-4px); box-shadow:var(--shadow-md)}
.product-info{padding:12px; flex:1; display:flex; flex-direction:column}
.product-name{font-size:12.5px; font-weight:700; margin-bottom:4px; line-height:1.4; flex:1}
.product-price{font-family:'Sora',sans-serif; font-size:14px; font-weight:800; color:var(--emerald-dark); margin-bottom:10px}
.add-btn{
  background:var(--emerald-light); color:var(--emerald-dark); border:1.5px solid var(--border-mid);
  border-radius:8px; padding:8px; font-size:12px; cursor:pointer; width:100%; font-weight:700
}

/* MODAL BASE */
.overlay{
  display:none; position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.5); z-index:300; align-items:flex-end; justify-content:center; backdrop-filter:blur(4px)
}
.overlay.open{display:flex}
.modal-sheet{
  background:var(--card); border-radius:20px 20px 0 0; width:100%; max-width:540px;
  max-height:92vh; overflow-y:auto; box-shadow:0 -8px 40px rgba(0,0,0,0.15); animation:slide-up 0.3s ease-out
}
@keyframes slide-up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-top{padding:1.25rem 1.5rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:white; z-index:1}
.modal-body{padding:1rem 1.5rem}

/* FORM BIODATA */
.form-section{margin-top:20px; border-top:2px dashed var(--border-mid); padding-top:20px}
.form-title{font-size:14px; font-weight:800; color:var(--emerald-dark); margin-bottom:12px; display:flex; align-items:center; gap:6px}
.form-group{margin-bottom:10px}
.form-label{display:block; font-size:10px; font-weight:700; color:var(--text-muted); margin-bottom:4px; text-transform:uppercase}
.form-input{width:100%; padding:10px; border-radius:10px; border:1.5px solid var(--border-mid); font-family:inherit; font-size:13px}
.checkout-btn{
  background:linear-gradient(135deg,#25D366,#128C7E); color:white; border:none;
  border-radius:12px; padding:16px; font-size:14px; font-weight:700; width:100%; margin-top:15px; cursor:pointer
}

/* POPUP PENCARIAN */
.popup-result-card{background:white; border-radius:15px; padding:20px; text-align:center; border:2px solid var(--emerald)}

.toast{
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--emerald-deeper); color:white; padding:11px 22px; border-radius:50px;
  font-size:13px; font-weight:600; z-index:400; opacity:0; transition:0.3s; pointer-events:none;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

/* WHATSAPP FLOAT */
.wa-float{
  position:fixed;bottom:24px;right:20px;z-index:150;
  background:#25D366;color:white;
  border:none;border-radius:50%;width:56px;height:56px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 20px rgba(37,211,102,0.4);
}
</style>
</head>
<body>

<nav class="navbar" id="navbar">
  <a class="logo" href="#">
    <div class="logo-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2a2 2 0 012 2v2h4a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V8a2 2 0 012-2h4V4a2 2 0 012-2zm1 9h2a1 1 0 010 2h-2v2a1 1 0 01-2 0v-2H9a1 1 0 010-2h2V9a1 1 0 012 0v2z"/></svg></div>
    <div class="logo-text"><span class="logo-name">Mitra Farma</span></div>
  </a>
  <button class="cart-btn" onclick="openCart()">🛒 Keranjang <span class="cart-badge" id="cartBadge">0</span></button>
</nav>

<div class="search-section">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-box" id="searchInput" type="text" placeholder="Cari nama obat (Contoh: ABATE, Acetyl, Bodrexin...)" oninput="onSearch()">
  </div>
</div>

<div class="product-grid" id="productGrid">
  <div style="grid-column:1/-1; text-align:center; padding:3rem; color:#9ca3af">Ketik nama obat untuk mencari...</div>
</div>

<!-- MODAL KERANJANG -->
<div class="overlay" id="cartOverlay" onclick="handleOverlay(event)">
  <div class="modal-sheet">
    <div class="modal-top">
      <span style="font-family:Sora; font-weight:700">🛒 Keranjang Belanja</span>
      <button onclick="closeCart()" style="border:none; background:none; font-size:20px; cursor:pointer">✕</button>
    </div>
    <div class="modal-body" id="cartBody"></div>
  </div>
</div>

<!-- POPUP SEARCH HASIL JSON -->
<div class="overlay" id="searchPopupOverlay" onclick="handleSearchOverlay(event)">
  <div class="modal-sheet" style="max-width: 400px; border-radius: 20px; align-self: center; margin-bottom: auto; margin-top: auto;">
    <div class="modal-top" style="border:none">
      <span style="font-weight:700">Produk Ditemukan!</span>
      <button onclick="closeSearchPopup()" style="border:none; background:none; font-size:20px; cursor:pointer">✕</button>
    </div>
    <div class="modal-body" id="searchPopupBody"></div>
  </div>
</div>

<button class="wa-float" onclick="window.open('https://wa.me/6285731070315')">
  <svg width="26" height="26" fill="white" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.558 4.12 1.528 5.847L.057 23.571a.5.5 0 00.619.618l5.805-1.457A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.87 0-3.63-.487-5.158-1.338l-.368-.213-3.44.864.88-3.35-.232-.378A9.947 9.947 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
</button>

<div class="toast" id="toast"></div>

<script>
const WA_NUM = "6285731070315";
let cart = [];
let allProducts = [];

// AMBIL DATA DARI JSON GITHUB
async function loadExternalProducts() {
  try {
    const response = await fetch('csvjson.json');
    if (!response.ok) throw new Error('File tidak ditemukan');
    allProducts = await response.json();
    console.log("Database produk JSON berhasil dimuat");
  } catch (err) {
    console.warn("Gagal memuat csvjson.json: ", err.message);
  }
}

// Fungsi membersihkan harga "Rp10.000,00" -> 10000
function parseHarga(str) {
  if(!str) return 0;
  let clean = str.replace(/[^\d]/g, "");
  if (str.includes(",")) return parseInt(clean) / 100;
  return parseInt(clean);
}

function fmt(n) { return "Rp" + (n || 0).toLocaleString('id-ID'); }

function onSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const grid = document.getElementById('productGrid');
  
  if (q.length < 3) {
    grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem; color:#9ca3af">Ketik minimal 3 huruf...</div>`;
    return;
  }

  // Filter berdasarkan kolom "nama" sesuai JSON
  const found = allProducts.filter(p => p.nama && p.nama.toLowerCase().includes(q));

  if (found.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem; color:#9ca3af">Produk "${q}" tidak ditemukan di gudang.</div>`;
  } else {
    // Tampilkan di grid utama
    grid.innerHTML = found.slice(0, 30).map(p => {
      const hrg = parseHarga(p["harga online"]);
      return `
        <div class="product-card">
          <div class="product-info">
            <div class="product-name">${p.nama}</div>
            <div class="product-price">${fmt(hrg)}</div>
            <button class="add-btn" onclick="addToCart('${p.nama.replace(/'/g, "\\'")}', ${hrg})">+ Keranjang</button>
          </div>
        </div>`;
    }).join('');

    // Tampilkan POPUP jika hanya ada 1 hasil yang sangat akurat
    if (found.length === 1) {
      showSearchPopup(found[0]);
    }
  }
}

function showSearchPopup(p) {
  const overlay = document.getElementById('searchPopupOverlay');
  const body = document.getElementById('searchPopupBody');
  const hrg = parseHarga(p["harga online"]);
  
  body.innerHTML = `
    <div class="popup-result-card">
      <h3 style="margin-bottom:10px">${p.nama}</h3>
      <div style="font-size:22px; font-weight:800; color:var(--emerald-dark); margin-bottom:20px">${fmt(hrg)}</div>
      <button class="checkout-btn" style="margin-top:0" onclick="addAndClosePopup('${p.nama.replace(/'/g, "\\'")}', ${hrg})">+ Masukkan Keranjang</button>
    </div>
  `;
  overlay.classList.add('open');
}

function addAndClosePopup(n, pr) {
  addToCart(n, pr);
  closeSearchPopup();
}

function closeSearchPopup() { document.getElementById('searchPopupOverlay').classList.remove('open'); }
function handleSearchOverlay(e) { if(e.target.id==='searchPopupOverlay') closeSearchPopup(); }

function addToCart(name, price) {
  const existing = cart.find(c => c.name === name);
  if (existing) { existing.qty++; } else { cart.push({ name, price, qty: 1 }); }
  updateBadge();
  showToast("✓ " + name + " ditambahkan");
}

function updateBadge() {
  const total = cart.reduce((s, c) => s + c.qty, 0);
  const b = document.getElementById('cartBadge');
  b.textContent = total;
  b.classList.toggle('visible', total > 0);
}

function openCart() {
  document.getElementById('cartOverlay').classList.add('open');
  renderCart();
}

function closeCart() { document.getElementById('cartOverlay').classList.remove('open'); }
function handleOverlay(e) { if(e.target.id==='cartOverlay') closeCart(); }

function renderCart() {
  const body = document.getElementById('cartBody');
  if (cart.length === 0) {
    body.innerHTML = `<div style="text-align:center; padding:3rem; color:#9ca3af">Keranjang masih kosong</div>`;
    return;
  }

  let totalBayar = 0;
  const items = cart.map((c, i) => {
    totalBayar += (c.price * c.qty);
    return `
      <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #f0f0f0">
        <div style="flex:1">
          <div style="font-weight:700; font-size:13px">${c.name}</div>
          <div style="color:var(--emerald-dark); font-size:12.5px">${fmt(c.price)} x ${c.qty}</div>
        </div>
        <div style="display:flex; align-items:center; gap:10px">
          <button class="qty-btn" onclick="changeQty(${i},-1)">-</button>
          <strong>${c.qty}</strong>
          <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
        </div>
      </div>`;
  }).join('');

  body.innerHTML = items + `
    <div style="margin-top:15px; background:var(--bg); padding:15px; border-radius:10px">
      <div style="display:flex; justify-content:space-between"><span>Total:</span> <strong>${fmt(totalBayar)}</strong></div>
    </div>

    <!-- DATA PENGIRIMAN -->
    <div class="form-section">
      <div class="form-title">📍 Data Pengiriman</div>
      <div class="form-group"><label class="form-label">Nama Lengkap</label><input type="text" id="custName" class="form-input" placeholder="Nama Anda"></div>
      <div class="form-group"><label class="form-label">No. WhatsApp</label><input type="tel" id="custWA" class="form-input" placeholder="08xxx"></div>
      <div class="form-group"><label class="form-label">Kecamatan</label><input type="text" id="custKec" class="form-input" placeholder="Kecamatan"></div>
      <div class="form-group"><label class="form-label">Kabupaten</label><input type="text" value="Kabupaten Semarang" id="custKab" class="form-input" readonly style="background:#eee"></div>
      <div class="form-group"><label class="form-label">Alamat Lengkap Rinci</label><textarea id="custAddr" class="form-input" rows="2" placeholder="Jl, No Rumah, Patokan..."></textarea></div>
    </div>

    <button class="checkout-btn" onclick="checkout()">Pesan via WhatsApp ➔</button>
  `;
}

function changeQty(i, d) {
  cart[i].qty += d;
  if (cart[i].qty <= 0) cart.splice(i, 1);
  updateBadge();
  renderCart();
}

function checkout() {
  const name = document.getElementById('custName').value.trim();
  const wa = document.getElementById('custWA').value.trim();
  const kec = document.getElementById('custKec').value.trim();
  const addr = document.getElementById('custAddr').value.trim();

  if (!name || !wa || !kec || !addr) {
    alert("⚠️ Mohon lengkapi biodata pengiriman!");
    return;
  }

  const itemsTxt = cart.map(c => `- ${c.name} (x${c.qty}) = ${fmt(c.price * c.qty)}`).join('\n');
  const total = cart.reduce((s, c) => s + (c.price * c.qty), 0);
  const msg = `Halo Mitra Farma, saya ingin memesan:\n\n${itemsTxt}\n\n*Total: ${fmt(total)}*\n\n*DATA PEMBELI:*\nNama: ${name}\nWA: ${wa}\nKecamatan: ${kec}\nAlamat: ${addr}\n\nTerima kasih.`;

  window.open(`https://wa.me/${WA_NUM}?text=${encodeURIComponent(msg)}`, '_blank');
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

window.onload = loadExternalProducts;
</script>
</body>
</html>
